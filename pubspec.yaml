name: wifi_analyzer
description: "A production-ready WiFi network analyzer built with Flutter."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Network & Permissions
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  network_info_plus: ^6.0.1
  wifi_scan: ^0.4.1+2
  device_info_plus: ^10.1.0

  # Charts
  fl_chart: ^0.69.0

  # CSV Export
  csv: ^6.0.0
  path_provider: ^2.1.4

  # Utilities
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true